name: Build Docs

on:
  push:
    branches: [main, staging]

permissions:
  id-token: write # This is required for requesting the JWT
  contents: read # This is required for actions/checkout

env:
  BUCKET_NAME: ${{ github.ref == 'refs/heads/main' && 's3://www.fused.io/' || 's3://docs-staging.fused.io/' }}
  CLOUDFRONT_ID: ${{ github.ref == 'refs/heads/main' && 'E2ZP0BRHQ20MYJ' || 'E33Z2H4C1WZOKH' }}

jobs:
  publish-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Auth with OIDC:
      # https://docs.github.com/en/actions/deployment/security-hardening-your-deployments/configuring-openid-connect-in-amazon-web-services
      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::926411091187:role/github_website_role
          role-session-name: GithubFusedLabsFusedPyReleaseDocs
          aws-region: us-west-2

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 23.1.0

      # Cache node_modules — keyed on package-lock.json so deps only reinstall when lockfile changes
      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}

      # Cache webpack/Docusaurus build artifacts separately so incremental builds reuse
      # prior compilation work even across commits (restore-keys find the most recent match)
      - name: Cache webpack build artifacts
        uses: actions/cache@v4
        with:
          path: node_modules/.cache
          key: ${{ runner.os }}-webpack-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-webpack-${{ hashFiles('package-lock.json') }}-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Build docs
        env:
          DEPLOYMENT_URL: 'https://docs.fused.io'
          BASE_URL: '/'
          IS_STAGING: 'false'
        run: npm run build

      #-------------------------------#
      #       Push the website        #
      #-------------------------------#
      # After running the build, copy the contents to the S3 bucket to be served, and invalidate the CloudFront cache so it starts serving the new content:
      - name: Publish website
        shell: bash
        run: |
          aws s3 sync ./build $BUCKET_NAME --delete

      - name: Invalidate CloudFront distribution
        shell: bash
        run: |
          aws cloudfront create-invalidation --distribution-id $CLOUDFRONT_ID --paths '/*'
