name: Docs staging deploy for PRs
run-name: Publish docs to staging website (for PR)

on:
    pull_request:

    # Allow running from the actions tab
    workflow_dispatch:
        inputs:
            schema_branch:
                description: 'Schema branch to pull from for /reference'
                required: true
                default: 'main'

permissions:
    id-token: write
    contents: read

env:
    # Using same bucket name as for staging deployment 
    BUCKET_NAME: 's3://docs-staging.fused.io'
    CLOUDFRONT_ID: 'E33Z2H4C1WZOKH'

jobs:
  build_and_publish:
    environment:
      name: staging
      url: https://docs-staging.fused.io/pr/${{github.event.number}}
    name: Build documentation and publish to staging
    runs-on: ubuntu-latest
    steps:
        - uses: actions/checkout@v4
          with:
            fetch-depth: 1

          # Auth with OIDC:
          # https://docs.github.com/en/actions/deployment/security-hardening-your-deployments/configuring-openid-connect-in-amazon-web-services
        - name: configure aws credentials
          uses: aws-actions/configure-aws-credentials@v4
          with:
            role-to-assume: arn:aws:iam::926411091187:role/github_website_role
            role-session-name: GithubFusedLabsFusedPyReleaseDocs
            aws-region: us-west-2

        - name: Use Node.js
          uses: actions/setup-node@v4
          with:
            node-version: 23.1.0

        - name: Check UDF embeds
          run: node scripts/check-udf-embeds.js

        # Cache node_modules — keyed on package-lock.json so deps only reinstall when lockfile changes
        - name: Cache node_modules
          id: cache-node-modules
          uses: actions/cache@v4
          with:
            path: node_modules
            key: ${{ runner.os }}-node-modules-${{ hashFiles('package-lock.json') }}

        # Cache webpack/Docusaurus build artifacts separately so incremental builds reuse
        # prior compilation work even across commits (restore-keys find the most recent match)
        - name: Cache webpack build artifacts
          uses: actions/cache@v4
          with:
            path: node_modules/.cache
            key: ${{ runner.os }}-webpack-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
            restore-keys: |
              ${{ runner.os }}-webpack-${{ hashFiles('package-lock.json') }}-

        - name: Install dependencies
          if: steps.cache-node-modules.outputs.cache-hit != 'true'
          run: npm ci

        - name: Build docs
          env:
            DEPLOYMENT_URL: 'https://docs-staging.fused.io'
            BASE_URL: '/pr/${{github.event.number}}'
            IS_STAGING: 'true'
          run: npm run build
        
        - name: Test critical links locally
          run: |
            # Start local server in background
            echo "🚀 Starting local server..."
            npx serve build -l 8080 > /dev/null 2>&1 &
            SERVER_PID=$!
            
            # Wait for server to be ready (with timeout)
            echo "⏳ Waiting for server to start..."
            for i in {1..10}; do
              if curl -sf http://localhost:8080/ > /dev/null; then
                echo "✅ Server ready after ${i} attempts"
                break
              fi
              if [ $i -eq 10 ]; then
                echo "❌ Server failed to start after 10 attempts"
                kill $SERVER_PID
                exit 1
              fi
              sleep 1
            done
            
            # Test critical pages (revamped structure)
            echo ""
            echo "🔗 Testing critical links..."
            
            if curl -sf http://localhost:8080/ > /dev/null; then
              echo "  ✅ Homepage: OK"
            else
              echo "  ❌ Homepage: FAILED"
              kill $SERVER_PID
              exit 1
            fi
            
            if curl -sf http://localhost:8080/blog/ > /dev/null; then
              echo "  ✅ Blog: OK"
            else
              echo "  ❌ Blog: FAILED"
              kill $SERVER_PID
              exit 1
            fi
            
            if curl -sf http://localhost:8080/quickstart/data-science > /dev/null; then
              echo "  ✅ Quickstart: OK"
            else
              echo "  ❌ Quickstart: FAILED"
              kill $SERVER_PID
              exit 1
            fi
            
            if curl -sf http://localhost:8080/guide/getting-started/first-udf-basics > /dev/null; then
              echo "  ✅ Guide - Getting Started: OK"
            else
              echo "  ❌ Guide - Getting Started: FAILED"
              kill $SERVER_PID
              exit 1
            fi
            
            if curl -sf http://localhost:8080/examples/zonal-stats > /dev/null; then
              echo "  ✅ Examples: OK"
            else
              echo "  ❌ Examples: FAILED"
              kill $SERVER_PID
              exit 1
            fi
            
            if curl -sf http://localhost:8080/workbench/overview > /dev/null; then
              echo "  ✅ Workbench: OK"
            else
              echo "  ❌ Workbench: FAILED"
              kill $SERVER_PID
              exit 1
            fi
            
            if curl -sf http://localhost:8080/python-sdk/ > /dev/null; then
              echo "  ✅ Python SDK: OK"
            else
              echo "  ❌ Python SDK: FAILED"
              kill $SERVER_PID
              exit 1
            fi
            
            # Test legacy redirects (should return redirect HTML, not 404)
            echo ""
            echo "🔄 Testing legacy redirects..."
            
            if curl -sf http://localhost:8080/tutorials/2min-with-fused > /dev/null; then
              echo "  ✅ /tutorials/2min-with-fused redirect: OK"
            else
              echo "  ❌ /tutorials/2min-with-fused redirect: FAILED"
              kill $SERVER_PID
              exit 1
            fi
            
            if curl -sf http://localhost:8080/core-concepts/run-udfs/run-small-udfs > /dev/null; then
              echo "  ✅ /core-concepts/run-udfs redirect: OK"
            else
              echo "  ❌ /core-concepts/run-udfs redirect: FAILED"
              kill $SERVER_PID
              exit 1
            fi
            
            # Kill server
            kill $SERVER_PID
            echo ""
            echo "✨ All critical links and redirects work locally"
        
        # Is this correct? 
        - name: Copy Docusaurus website to staging bucket to new PR prefix ${{env.BUCKET_NAME}}/pr/${{github.event.number}}/
          run: |
            aws --region us-east-2 s3 sync --delete --storage-class INTELLIGENT_TIERING build ${{env.BUCKET_NAME}}/pr/${{github.event.number}}

        - name: Invalidate CloudFront distribution for PR
          shell: bash
          run: |
            aws cloudfront create-invalidation --distribution-id $CLOUDFRONT_ID --paths '/pr/${{github.event.number}}/*'
            
        - name: Wait for deployment and test staging links
          run: |
            STAGING_URL="https://docs-staging.fused.io/pr/${{github.event.number}}"
            echo "🌐 Testing staging deployment at $STAGING_URL"
            
            # Wait for staging to be ready (with timeout)
            echo "⏳ Waiting for staging deployment to be accessible..."
            for i in {1..20}; do
              if curl -sf "$STAGING_URL/" > /dev/null; then
                echo "✅ Staging ready after ${i} attempts"
                break
              fi
              if [ $i -eq 20 ]; then
                echo "❌ Staging deployment not accessible after 20 attempts"
                exit 1
              fi
              sleep 3
            done
            
            # Test critical pages on staging (v7 structure)
            echo ""
            echo "🔗 Testing critical staging links..."
            
            if curl -sf "$STAGING_URL/" > /dev/null; then
              echo "  ✅ Homepage: OK"
            else
              echo "  ❌ Homepage: FAILED"
              exit 1
            fi
            
            # Test both URL formats to ensure no redirects and both work
            if curl -sf "$STAGING_URL/blog" > /dev/null; then
              echo "  ✅ Blog (no slash): OK"
            else
              echo "  ❌ Blog (no slash): FAILED"
              exit 1
            fi
            
            if curl -sf "$STAGING_URL/blog/" > /dev/null; then
              echo "  ✅ Blog (with slash): OK"
            else
              echo "  ❌ Blog (with slash): FAILED"
              exit 1
            fi
            
            if curl -sf "$STAGING_URL/quickstart/data-science" > /dev/null; then
              echo "  ✅ Quickstart: OK"
            else
              echo "  ❌ Quickstart: FAILED"
              exit 1
            fi
            
            if curl -sf "$STAGING_URL/guide/getting-started/first-udf-basics" > /dev/null; then
              echo "  ✅ Guide - Getting Started: OK"
            else
              echo "  ❌ Guide - Getting Started: FAILED"
              exit 1
            fi
            
            if curl -sf "$STAGING_URL/examples/zonal-stats" > /dev/null; then
              echo "  ✅ Examples: OK"
            else
              echo "  ❌ Examples: FAILED"
              exit 1
            fi
            
            if curl -sf "$STAGING_URL/workbench/overview" > /dev/null; then
              echo "  ✅ Workbench: OK"
            else
              echo "  ❌ Workbench: FAILED"
              exit 1
            fi
            
            if curl -sf "$STAGING_URL/python-sdk/" > /dev/null; then
              echo "  ✅ Python SDK: OK"
            else
              echo "  ❌ Python SDK: FAILED"
              exit 1
            fi
            
            # Test legacy redirects work on staging
            echo ""
            echo "🔄 Testing legacy redirects on staging..."
            
            if curl -sf "$STAGING_URL/tutorials/2min-with-fused" > /dev/null; then
              echo "  ✅ /tutorials/2min-with-fused redirect: OK"
            else
              echo "  ❌ /tutorials/2min-with-fused redirect: FAILED"
              exit 1
            fi
            
            if curl -sf "$STAGING_URL/core-concepts/run-udfs/run-small-udfs" > /dev/null; then
              echo "  ✅ /core-concepts/run-udfs redirect: OK"
            else
              echo "  ❌ /core-concepts/run-udfs redirect: FAILED"
              exit 1
            fi
            
            echo ""
            echo "✨ All critical links and redirects work on staging"
            