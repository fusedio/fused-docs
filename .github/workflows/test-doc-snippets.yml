name: Test doc code snippets

on:
  pull_request:
  workflow_dispatch:

jobs:
  syntax-check:
    name: Tier 1 — syntax check (all Python blocks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Check Python block syntax in docs
        run: uv run utils/test_doc_snippets.py

  # Tier 2 (execute runnable blocks) does NOT run in CI. It executes the docs'
  # code against Fused servers, which needs an authenticated session — not
  # available headlessly here. It runs instead as a local pre-commit hook
  # (`doc-snippet-execution` in .pre-commit-config.yaml), scoped to the files
  # you changed, using your local `fused login`. See utils/run_doc_execution.py.
