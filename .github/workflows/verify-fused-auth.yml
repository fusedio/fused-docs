name: Verify fused auth (temp)

on:
  push:
    branches:
      - claude/unruffled-williams-13cdea
  workflow_dispatch:

jobs:
  verify:
    name: Verify FUSED_DOCS_CI service token
    runs-on: ubuntu-latest
    env:
      FUSED_AUTH_TOKEN: ${{ secrets.FUSED_DOCS_CI }}
      FUSED_AUTH_TOKEN_TYPE: Fused-Service-Token
    steps:
      - uses: actions/checkout@v3

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: whoami (may 401 for service tokens — informational)
        continue-on-error: true
        run: uv run --with fused fused whoami

      - name: Write a trivial UDF to a file
        run: |
          cat > verify_udf.py <<'PY'
          import fused

          @fused.udf
          def udf():
              import pandas as pd
              return pd.DataFrame({"ok": [1]})
          PY

      - name: Run the UDF remotely (real auth + execution test)
        run: uv run --with fused fused run "" verify_udf.py
