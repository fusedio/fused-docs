name: Verify fused auth (temp)

on:
  push:
    branches:
      - claude/unruffled-williams-13cdea
  workflow_dispatch:

jobs:
  verify:
    name: Verify FUSED_DOCS_CI service token
    runs-on: ubuntu-latest
    env:
      FUSED_AUTH_TOKEN: ${{ secrets.FUSED_DOCS_CI }}
      FUSED_AUTH_TOKEN_TYPE: Fused-Service-Token
    steps:
      - uses: actions/checkout@v3

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Inspect secret shape (redacted)
        run: |
          python3 - <<'PY'
          import os
          t = os.environ.get("FUSED_AUTH_TOKEN", "")
          print("len:", len(t))
          print("has_leading_ws:", t[:1].isspace() if t else None)
          print("has_trailing_ws:", t[-1:].isspace() if t else None)
          print("has_newline:", "\n" in t)
          print("first4:", t[:4])
          print("last2:", t[-2:])
          PY

      - name: whoami
        continue-on-error: true
        run: uv run --with fused fused whoami

      - name: Run a trivial UDF remotely
        continue-on-error: true
        run: |
          uv run --with fused python - <<'PY'
          import fused

          @fused.udf
          def t():
              import pandas as pd
              return pd.DataFrame({"ok": [1]})

          print(fused.run(t))
          PY
