repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      # - id: check-added-large-files

  - repo: https://github.com/psf/black
    rev: 24.8.0
    hooks:
      - id: black

  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ["--profile", "black"]

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: "v4.0.0-alpha.8"
    hooks:
      - id: prettier
        types_or: [yaml, css, ts, tsx, javascript]

  - repo: https://github.com/tcort/markdown-link-check
    rev: v3.12.2
    hooks:
      - id: markdown-link-check
        args: [-q]

  - repo: local
    hooks:
      - id: doc-snippet-syntax
        name: Python block syntax check (docs)
        language: system
        entry: uv run utils/test_doc_snippets.py
        files: '\.mdx?$'
        exclude: 'docs/python-sdk/api-reference/'
        pass_filenames: true

      - id: check-doc-links
        name: Broken internal links & assets (docs)
        language: system
        entry: node scripts/check-doc-links.js --warn
        files: '(^docs/.*\.mdx?$|^docusaurus\.config\.ts$|^static/)'
        pass_filenames: false
        verbose: true # always print the report, even though it never blocks
